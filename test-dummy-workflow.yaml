  steps:
  - id: trigger
    name: Creating your appication
    action: trigger:harness-custom-pipeline
    input:
      url: https://qa.harness.io/ng/account/rzjR8UyZTpOAd6SLDfdBuw/module/cd/orgs/default/projects/DeepeshIDP/pipelines/Test/pipeline-studio/?storeType=INLINE
      inputset:
        service_name: ${{ parameters.service_name }}
      apikey: ${{ parameters.token }}
metadata:
  description: 'dummy '
  tags:
  - test-sanity
