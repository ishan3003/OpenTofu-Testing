apiVersion: harness.io/v1
kind: Workflow
type: workflow
identifier: Dummy_101_Gitx
name: Dummy 101 Gitx
owner: user:account/deepesh.kumar@harness.io
spec:
  output:
    links:
    - title: Pipeline Details
      url: ${{ steps.trigger.output.PipelineUrl }}
  lifecycle: test
  parameters:
  - title: Service Details
    properties:
      token:
        title: Harness Token
        type: string
        ui:widget: password
        ui:field: HarnessAuthToken
      service_name:
        title: Service Name
        type: string
